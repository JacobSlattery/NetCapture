[project]
name = "netcapture"
version = "1.0.0"
description = "Wireshark-like real-time network capture and display tool"
channels = ["conda-forge"]
platforms = ["win-64"]

[dependencies]
python     = ">=3.11,<3.13"
nodejs     = ">=20"           # frontend toolchain (Vite / npm)

# ── Backend ────────────────────────────────────────────────────────────────
fastapi    = ">=0.111"
uvicorn    = ">=0.30"
watchfiles = ">=0.21"         # enables uvicorn --reload
websockets = ">=12"
psutil     = ">=5.9"

pytest = ">=8"

# ── Optional Npcap / scapy capture (full L2) ───────────────────────────────
# Install Npcap first: https://npcap.com
# Then run backend in the npcap environment:  pixi run --environment npcap dev-api
[feature.npcap.dependencies]
scapy = ">=2.5"

[environments]
npcap = { features = ["npcap"] }

# ── Tasks ──────────────────────────────────────────────────────────────────
[tasks]

# Frontend
install-ui = { cmd = "npm install",   cwd = "frontend", description = "Install npm packages" }
dev-ui     = { cmd = "npm run dev",   cwd = "frontend", depends-on = ["install-ui"], description = "Vite dev server  →  http://localhost:5173" }
build-ui   = { cmd = "npm run build", cwd = "frontend", depends-on = ["install-ui"], description = "Production build  →  backend/static/" }

# Backend
dev-api    = { cmd = "python backend/server.py", description = "FastAPI + uvicorn  →  http://localhost:8000" }

# Tests
test = { cmd = "python -m pytest tests/ -v", description = "Run capture parsing unit tests" }

# UDP mock device (no admin rights needed)
# Default mode is 'feed' — sends directly to backend sink on port 9001
mock-device = { cmd = "python tools/udp_device.py", description = "Mock UDP device — add --format nc-frame for decoded packets (--mode feed|chat|sender|receiver|echo)" }
inject        = { cmd = "python tools/ws_injector.py", description = "WebSocket packet injector → /ws/inject (--mode nc-frame|random|replay  --rate N  --file x.pcap)" }
inject-faults = { cmd = "python tools/fault_injector.py", description = "Fault injector — sends packets with bad checksums and decoder errors to test issue indicators" }

# Production: build frontend then serve everything from FastAPI
serve = { cmd = "python backend/server.py", depends-on = ["build-ui"], description = "Build + serve on :8000" }
