# rattler-build recipe — Cython-compiled .conda package for netcapture
# Build:  pixi run build-pkg-compiled   (runs build-ui first, then rattler-build)
# Output: dist/conda/
#
# Implementation modules are compiled to native extensions (.pyd on Windows, .so on Linux/macOS).
# Only public API stubs (__init__.py, __main__.py) ship as readable Python.
#
# Trade-offs vs pure-Python build (recipe.yaml):
#   + Source code is not human-readable
#   - Locked to a single Python version (cp312) and platform
#   - Stack traces show compiled function names, not source lines
#   - Requires a C compiler (MSVC on Windows, clang/gcc on macOS/Linux)

schema_version: 1

context:
  version: "1.0.0"

package:
  name: netcapture
  version: ${{ version }}

source:
  path: backend/

build:
  script:
    - python -m pip install . --no-deps --no-build-isolation -vv
    # Strip .py, .c, and .pyc for Cython-compiled modules
    - python strip_sources.py

requirements:
  build:
    - if: win
      then: vs2022_win-64
    - if: not win
      then: ${{ compiler('c') }}
  host:
    - python
    - pip
    - setuptools >=68
    - cython >=3
  run:
    - python
    - fastapi >=0.111
    - uvicorn >=0.30
    - websockets >=12
    - psutil >=6.1

tests:
  - python:
      imports:
        - netcapture
  - script:
      - python -c "from netcapture import create_router; print('ok')"

about:
  summary: NetCapture — embeddable real-time network capture and display library
  license: MIT
